name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-and-test:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # TODO: Re-enable ubuntu-latest and macos-latest when platform builds are fixed
        os: [windows-latest]
        include:
          - os: windows-latest
            preset: ci

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b322364f06308bdd24823f9d8f03fe0cc86fd46f'

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }} --config Release

      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --build-config Release -V

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check C++ formatting
        run: |
          find core/ cli/ notepad-plus-plus/ -name '*.cpp' -o -name '*.h' | \
            xargs clang-format-17 --dry-run -Werror 2>&1 || true
        continue-on-error: true

      - name: Check TypeScript formatting
        if: hashFiles('vscode-extension/package.json') != ''
        run: |
          cd vscode-extension
          if [ -f package-lock.json ]; then
            npm ci
            npx prettier --check "src/**/*.ts" || true
          fi
        continue-on-error: true
